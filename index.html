<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Journey | From Earth to Infinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* UI Layer */
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 40px;
            box-sizing: border-box;
        }
        
        .info-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px 30px;
            max-width: 400px;
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        
        .location-badge {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00f2ff;
            margin-bottom: 10px;
        }
        
        .location-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #00f2ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        .distance {
            font-size: 0.9rem;
            opacity: 0.7;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .scale-info {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 8px;
        }
        
        /* Controls */
        .controls {
            pointer-events: auto;
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .ctrl-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 12px 28px;
            color: white;
            font-size: 0.8rem;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .ctrl-btn:hover {
            background: rgba(0, 242, 255, 0.3);
            border-color: #00f2ff;
            transform: scale(1.05);
        }
        
        .progress-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            pointer-events: auto;
        }
        
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.6rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }
        
        .scroll-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 2px;
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
        
        @media (max-width: 768px) {
            #ui { padding: 20px; }
            .info-card { padding: 12px 20px; max-width: 280px; }
            .location-name { font-size: 1.3rem; }
            .controls { gap: 8px; }
            .ctrl-btn { padding: 8px 16px; font-size: 0.6rem; }
            .progress-container { width: 250px; bottom: 20px; }
            .scroll-hint { bottom: 15px; right: 15px; font-size: 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="info-card">
            <div class="location-badge">✦ CURRENT LOCATION ✦</div>
            <div class="location-name" id="locationName">Earth</div>
            <div class="distance" id="distance">You are here</div>
            <div class="scale-info" id="scaleInfo">Scale: Human perspective</div>
        </div>
        
        <div>
            <div class="controls">
                <button class="ctrl-btn" id="zoomOutBtn">⟵ ZOOM OUT</button>
                <button class="ctrl-btn" id="zoomInBtn">ZOOM IN ⟶</button>
                <button class="ctrl-btn" id="resetBtn">⟡ RESET</button>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-labels">
                    <span>🌍 Earth</span>
                    <span>🌌 Galaxy</span>
                    <span>🌀 Universe</span>
                </div>
            </div>
        </div>
    </div>
    <div class="scroll-hint">✦ SCROLL TO EXPLORE THE COSMOS ✦</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010105);
        scene.fog = new THREE.FogExp2(0x010105, 0.00001);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000000000);
        camera.position.set(0, 5, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controls state
        let zoomLevel = 0; // 0 = Earth, 1 = Solar System, 2 = Galaxy, 3 = Universe
        let targetZoom = 0;
        let cameraDistance = 15;
        
        // Starfield background
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 3000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 20000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 20000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 5000 - 2000;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Earth with texture
        const earthGeometry = new THREE.SphereGeometry(2, 128, 128);
        const earthMaterial = new THREE.MeshStandardMaterial({
            color: 0x2277ff,
            emissive: 0x004466,
            roughness: 0.5,
            metalness: 0.1
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Atmosphere glow
        const atmosphereGeometry = new THREE.SphereGeometry(2.05, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x44aaff,
            transparent: true,
            opacity: 0.15
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);
        
        // Clouds layer
        const cloudGeometry = new THREE.SphereGeometry(2.02, 128, 128);
        const cloudMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.1
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // Solar System objects (will be scaled and positioned based on zoom)
        const planets = [];
        const planetData = [
            { name: "Mercury", color: 0xcc9966, size: 0.38, distance: 4.5, speed: 0.02 },
            { name: "Venus", color: 0xffaa66, size: 0.95, distance: 6, speed: 0.015 },
            { name: "Earth", color: 0x2277ff, size: 1, distance: 7.5, speed: 0.012 },
            { name: "Mars", color: 0xff6633, size: 0.53, distance: 9, speed: 0.01 },
            { name: "Jupiter", color: 0xdd8866, size: 1.8, distance: 14, speed: 0.007 },
            { name: "Saturn", color: 0xeeddbb, size: 1.5, distance: 17, speed: 0.005 },
            { name: "Uranus", color: 0x88ccff, size: 1.2, distance: 20, speed: 0.004 },
            { name: "Neptune", color: 0x3366cc, size: 1.15, distance: 23, speed: 0.003 }
        ];
        
        planetData.forEach((data, i) => {
            const geometry = new THREE.SphereGeometry(data.size, 64, 64);
            const material = new THREE.MeshStandardMaterial({ color: data.color, emissive: 0x111111 });
            const planet = new THREE.Mesh(geometry, material);
            planet.userData = { distance: data.distance, speed: data.speed, angle: Math.random() * Math.PI * 2, name: data.name };
            scene.add(planet);
            planets.push(planet);
            
            // Add orbit ring
            const orbitPoints = [];
            const orbitRadius = data.distance;
            for (let i = 0; i <= 100; i++) {
                const angle = (i / 100) * Math.PI * 2;
                const x = Math.cos(angle) * orbitRadius;
                const z = Math.sin(angle) * orbitRadius;
                orbitPoints.push(new THREE.Vector3(x, 0, z));
            }
            const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
            const orbitMaterial = new THREE.LineBasicMaterial({ color: 0x336699, transparent: true, opacity: 0.3 });
            const orbit = new THREE.LineLoop(orbitGeometry, orbitMaterial);
            scene.add(orbit);
        });
        
        // Saturn's rings
        const ringGeometry = new THREE.TorusGeometry(2.2, 0.4, 32, 100);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0xccaa88, emissive: 0x442200 });
        const saturnRing = new THREE.Mesh(ringGeometry, ringMaterial);
        saturnRing.rotation.x = Math.PI / 2;
        scene.add(saturnRing);
        
        // Galaxy particles
        const galaxyParticleCount = 5000;
        const galaxyGeometry = new THREE.BufferGeometry();
        const galaxyPositions = new Float32Array(galaxyParticleCount * 3);
        const galaxyColors = new Float32Array(galaxyParticleCount * 3);
        for (let i = 0; i < galaxyParticleCount; i++) {
            const radius = Math.pow(Math.random(), 1.5) * 80;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 15;
            galaxyPositions[i*3] = Math.cos(angle) * radius;
            galaxyPositions[i*3+1] = y;
            galaxyPositions[i*3+2] = Math.sin(angle) * radius;
            
            const color = new THREE.Color().setHSL(0.12 + Math.random() * 0.1, 0.8, 0.5);
            galaxyColors[i*3] = color.r;
            galaxyColors[i*3+1] = color.g;
            galaxyColors[i*3+2] = color.b;
        }
        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));
        const galaxyMaterial = new THREE.PointsMaterial({ size: 0.3, vertexColors: true, transparent: true, opacity: 0.6 });
        const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(galaxy);
        
        // Universe particles (distant galaxies)
        const universeParticleCount = 8000;
        const universeGeometry = new THREE.BufferGeometry();
        const universePositions = new Float32Array(universeParticleCount * 3);
        for (let i = 0; i < universeParticleCount; i++) {
            universePositions[i*3] = (Math.random() - 0.5) * 2000;
            universePositions[i*3+1] = (Math.random() - 0.5) * 1000;
            universePositions[i*3+2] = (Math.random() - 0.5) * 1500 - 500;
        }
        universeGeometry.setAttribute('position', new THREE.BufferAttribute(universePositions, 3));
        const universeMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.2, transparent: true, opacity: 0.4 });
        const universeParticles = new THREE.Points(universeGeometry, universeMaterial);
        scene.add(universeParticles);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 20, 5);
        scene.add(sunLight);
        const backLight = new THREE.PointLight(0x4488ff, 0.3);
        backLight.position.set(0, 0, -10);
        scene.add(backLight);
        
        // Camera animation variables
        let time = 0;
        
        // UI Elements
        const locationNameEl = document.getElementById('locationName');
        const distanceEl = document.getElementById('distance');
        const scaleInfoEl = document.getElementById('scaleInfo');
        const progressFill = document.getElementById('progressFill');
        
        // Zoom levels mapping
        const zoomStages = [
            { name: "Earth", distance: "You are here", scale: "Human perspective", cameraDist: 15, earthScale: 1, planetOpacity: 0, galaxyOpacity: 0, universeOpacity: 0 },
            { name: "Solar System", distance: "~1 AU from Sun", scale: "Astronomical scale", cameraDist: 35, earthScale: 0.8, planetOpacity: 1, galaxyOpacity: 0, universeOpacity: 0 },
            { name: "Milky Way Galaxy", distance: "~100,000 light-years across", scale: "Galactic scale", cameraDist: 120, earthScale: 0.3, planetOpacity: 0.3, galaxyOpacity: 1, universeOpacity: 0 },
            { name: "Observable Universe", distance: "~93 billion light-years", scale: "Cosmic scale", cameraDist: 350, earthScale: 0.05, planetOpacity: 0, galaxyOpacity: 0.5, universeOpacity: 1 }
        ];
        
        function updateZoom() {
            // Smooth interpolation
            zoomLevel += (targetZoom - zoomLevel) * 0.05;
            const stage = Math.floor(zoomLevel);
            const blend = zoomLevel - stage;
            
            const currentStage = zoomStages[Math.min(stage, zoomStages.length - 1)];
            const nextStage = zoomStages[Math.min(stage + 1, zoomStages.length - 1)];
            
            if (currentStage) {
                // Interpolate camera distance
                if (nextStage) {
                    cameraDistance = currentStage.cameraDist + (nextStage.cameraDist - currentStage.cameraDist) * blend;
                } else {
                    cameraDistance = currentStage.cameraDist;
                }
                
                // Update UI
                if (blend < 0.5 || !nextStage) {
                    locationNameEl.textContent = currentStage.name;
                    distanceEl.textContent = currentStage.distance;
                    scaleInfoEl.textContent = currentStage.scale;
                } else {
                    locationNameEl.textContent = nextStage.name;
                    distanceEl.textContent = nextStage.distance;
                    scaleInfoEl.textContent = nextStage.scale;
                }
            }
            
            // Update progress bar
            const progress = zoomLevel / (zoomStages.length - 1);
            progressFill.style.width = `${progress * 100}%`;
            
            // Animate camera
            const targetPos = new THREE.Vector3(0, 2, cameraDistance);
            camera.position.lerp(targetPos, 0.05);
            camera.lookAt(0, 0, 0);
            
            // Scale Earth and atmosphere based on zoom
            let earthScale = 1;
            let planetOpacity = 0;
            let galaxyOpacity = 0;
            let universeOpacity = 0;
            
            if (zoomLevel < 1) {
                earthScale = 1 - zoomLevel * 0.7;
                planetOpacity = zoomLevel;
                galaxyOpacity = 0;
                universeOpacity = 0;
            } else if (zoomLevel < 2) {
                const t = (zoomLevel - 1);
                earthScale = 0.3 - t * 0.25;
                planetOpacity = 1 - t;
                galaxyOpacity = t;
                universeOpacity = 0;
            } else {
                const t = Math.min(1, zoomLevel - 2);
                earthScale = 0.05 - t * 0.04;
                planetOpacity = 0;
                galaxyOpacity = 1 - t;
                universeOpacity = t;
            }
            
            earth.scale.setScalar(Math.max(0.01, earthScale));
            atmosphere.scale.setScalar(Math.max(0.01, earthScale));
            clouds.scale.setScalar(Math.max(0.01, earthScale));
            
            // Update planet visibility and scale
            planets.forEach(planet => {
                planet.scale.setScalar(earthScale);
                if (planetOpacity > 0) {
                    planet.material.opacity = Math.min(1, planetOpacity);
                    planet.material.transparent = true;
                }
            });
            saturnRing.scale.setScalar(earthScale);
            saturnRing.material.opacity = planetOpacity;
            saturnRing.material.transparent = true;
            
            // Update galaxy and universe opacity
            galaxy.material.opacity = galaxyOpacity * 0.6;
            universeParticles.material.opacity = universeOpacity * 0.4;
            stars.material.opacity = 0.3 + zoomLevel * 0.2;
        }
        
        // Update planet positions
        function updatePlanets() {
            planets.forEach((planet, i) => {
                const data = planetData[i];
                planet.userData.angle += data.speed * 0.5;
                const x = Math.cos(planet.userData.angle) * data.distance;
                const z = Math.sin(planet.userData.angle) * data.distance;
                planet.position.set(x, 0, z);
            });
            // Saturn rings position
            if (planets[5]) {
                saturnRing.position.copy(planets[5].position);
                saturnRing.rotation.z = time * 0.2;
            }
        }
        
        // Rotate galaxy
        function updateGalaxy() {
            galaxy.rotation.y += 0.002;
            galaxy.rotation.x = Math.sin(time * 0.1) * 0.1;
        }
        
        // Zoom controls
        function zoomOut() {
            targetZoom = Math.min(zoomStages.length - 1, targetZoom + 0.15);
        }
        
        function zoomIn() {
            targetZoom = Math.max(0, targetZoom - 0.15);
        }
        
        function reset() {
            targetZoom = 0;
        }
        
        // Event listeners
        document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
        document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
        document.getElementById('resetBtn').addEventListener('click', reset);
        
        // Scroll wheel
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY > 0) {
                targetZoom = Math.min(zoomStages.length - 1, targetZoom + 0.05);
            } else {
                targetZoom = Math.max(0, targetZoom - 0.05);
            }
        }, { passive: false });
        
        // Click on progress bar
        const progressBar = document.getElementById('progressBar');
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = x / rect.width;
            targetZoom = percent * (zoomStages.length - 1);
        });
        
        // Touch support
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const delta = (touchStartY - e.touches[0].clientY) * 0.005;
            targetZoom = Math.min(zoomStages.length - 1, Math.max(0, targetZoom + delta));
            touchStartY = e.touches[0].clientY;
        }, { passive: false });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            updateZoom();
            updatePlanets();
            updateGalaxy();
            
            // Rotate Earth
            earth.rotation.y += 0.005;
            atmosphere.rotation.y += 0.003;
            clouds.rotation.y += 0.007;
            
            // Rotate stars slowly
            stars.rotation.y += 0.0005;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Add some floating particles effect
        console.log('🌌 Cosmic journey started | From Earth to Infinity');
    </script>
</body>
</html>
