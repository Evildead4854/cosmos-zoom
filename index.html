<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universe Simulator | Quantum to Cosmos</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border-left: 3px solid #00f2ff;
            z-index: 100;
            pointer-events: none;
            color: white;
            max-width: 300px;
        }
        .title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #00f2ff;
            margin-bottom: 5px;
        }
        .object-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 5px 0;
        }
        .details {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 100;
            pointer-events: auto;
        }
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        button:hover {
            background: #00f2ff;
            color: black;
            border-color: #00f2ff;
        }
        .instruction {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #aaa;
            pointer-events: none;
            z-index: 100;
        }
        @media (max-width: 768px) {
            .object-name { font-size: 1rem; }
            button { padding: 4px 10px; font-size: 0.6rem; }
            .controls-panel { gap: 6px; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <div class="title">✦ CURRENT VIEW ✦</div>
        <div class="object-name" id="objName">Planck Length</div>
        <div class="details" id="objDetails">The smallest measurable scale</div>
    </div>
    <div class="controls-panel">
        <button id="btnQuantum">⚛️ Quantum</button>
        <button id="btnHuman">👤 Human</button>
        <button id="btnEarth">🌍 Earth</button>
        <button id="btnSolar">🌞 Solar System</button>
        <button id="btnGalaxy">🌀 Galaxy</button>
        <button id="btnUniverse">🌌 Universe</button>
    </div>
    <div class="instruction">🖱️ Drag to rotate | Scroll to zoom through scales</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.00003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 1e9);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Post-processing bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.4, 0.2);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 0.8;
        controls.enablePan = true;
        controls.panSpeed = 0.5;
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.4);
        backLight.position.set(-5, 0, -10);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.3);
        fillLight.position.set(5, 3, 8);
        scene.add(fillLight);

        // --- Starfield Background (distant stars) ---
        const starCount = 6000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 8000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 5000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 3000 - 1000;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- Helper: Create a planet with basic texture ---
        function createPlanet(radius, color, detail = 64, emissive = 0x000000, emissiveIntensity = 0) {
            const geometry = new THREE.SphereGeometry(radius, detail, detail);
            const material = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity, roughness: 0.5, metalness: 0.1 });
            const planet = new THREE.Mesh(geometry, material);
            planet.castShadow = true;
            planet.receiveShadow = false;
            return planet;
        }

        // --- Detailed Earth (with high-res textures from Three.js examples) ---
        const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
        const textureLoader = new THREE.TextureLoader();
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 5,
            normalMap: earthNormalMap
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        
        // Clouds layer
        const cloudGeometry = new THREE.SphereGeometry(1.01, 128, 128);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.15
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        earth.add(clouds);
        
        // Atmosphere glow
        const atmGeometry = new THREE.SphereGeometry(1.03, 64, 64);
        const atmMaterial = new THREE.MeshPhongMaterial({ color: 0x44aaff, transparent: true, opacity: 0.08 });
        const atmosphere = new THREE.Mesh(atmGeometry, atmMaterial);
        earth.add(atmosphere);
        
        scene.add(earth);

        // --- Solar System planets (relative sizes and orbits, distances scaled logarithmically for visibility) ---
        const planets = [];
        const planetData = [
            { name: "Mercury", color: 0xbc9a6c, size: 0.38, distance: 4.5, speed: 0.025, detail: 64 },
            { name: "Venus",   color: 0xe6b800, size: 0.95, distance: 6.0, speed: 0.018, detail: 64 },
            { name: "Earth",   color: 0x2277ff, size: 1.0,  distance: 7.5, speed: 0.015, detail: 128, special: earth },
            { name: "Mars",    color: 0xcc6644, size: 0.53, distance: 9.0, speed: 0.012, detail: 64 },
            { name: "Jupiter", color: 0xd8a27a, size: 1.8,  distance: 14.0, speed: 0.007, detail: 96 },
            { name: "Saturn",  color: 0xf0e2b6, size: 1.5,  distance: 17.0, speed: 0.005, detail: 96 },
            { name: "Uranus",  color: 0xb0e0e6, size: 1.2,  distance: 20.0, speed: 0.004, detail: 80 },
            { name: "Neptune", color: 0x4169e1, size: 1.15, distance: 23.0, speed: 0.003, detail: 80 }
        ];
        
        // Store planet meshes and their data
        const planetMeshes = [];
        planetData.forEach((data, i) => {
            if (data.special) {
                // Earth already exists
                const planet = earth;
                planet.userData = { name: data.name, distance: data.distance, speed: data.speed, angle: Math.random() * Math.PI * 2 };
                planetMeshes.push(planet);
                // Add orbit line
                const orbitPoints = [];
                const radius = data.distance;
                for (let ang = 0; ang <= 100; ang++) {
                    const theta = (ang / 100) * Math.PI * 2;
                    const x = Math.cos(theta) * radius;
                    const z = Math.sin(theta) * radius;
                    orbitPoints.push(new THREE.Vector3(x, 0, z));
                }
                const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
                const orbitMat = new THREE.LineBasicMaterial({ color: 0x4488aa, transparent: true, opacity: 0.3 });
                const orbitLine = new THREE.LineLoop(orbitGeo, orbitMat);
                scene.add(orbitLine);
            } else {
                const planet = createPlanet(data.size, data.color, data.detail);
                planet.userData = { name: data.name, distance: data.distance, speed: data.speed, angle: Math.random() * Math.PI * 2 };
                scene.add(planet);
                planetMeshes.push(planet);
                // Orbit
                const orbitPoints = [];
                const radius = data.distance;
                for (let ang = 0; ang <= 100; ang++) {
                    const theta = (ang / 100) * Math.PI * 2;
                    const x = Math.cos(theta) * radius;
                    const z = Math.sin(theta) * radius;
                    orbitPoints.push(new THREE.Vector3(x, 0, z));
                }
                const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
                const orbitMat = new THREE.LineBasicMaterial({ color: 0x4488aa, transparent: true, opacity: 0.3 });
                const orbitLine = new THREE.LineLoop(orbitGeo, orbitMat);
                scene.add(orbitLine);
            }
        });
        
        // Saturn's rings
        const saturn = planetMeshes.find(p => p.userData?.name === "Saturn");
        if (saturn) {
            const ringGeo = new THREE.TorusGeometry(2.2, 0.4, 64, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xc2b280, emissive: 0x442200, transparent: true, opacity: 0.8 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            saturn.add(ring);
        }
        
        // --- The Sun (light source and central object) ---
        const sunGeometry = new THREE.SphereGeometry(3, 128, 128);
        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa44,
            emissive: 0xff4422,
            emissiveIntensity: 1.2,
            roughness: 0.3
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);
        // Sun light source
        const sunLightSource = new THREE.PointLight(0xffaa66, 1.5, 0, 2);
        sunLightSource.position.set(0, 0, 0);
        scene.add(sunLightSource);
        
        // --- Quantum Realm (tiny glowing particles near origin) ---
        const quantumGroup = new THREE.Group();
        const quantumParticleCount = 800;
        const quantumGeo = new THREE.BufferGeometry();
        const quantumPositions = new Float32Array(quantumParticleCount * 3);
        for (let i = 0; i < quantumParticleCount; i++) {
            quantumPositions[i*3] = (Math.random() - 0.5) * 2;
            quantumPositions[i*3+1] = (Math.random() - 0.5) * 2;
            quantumPositions[i*3+2] = (Math.random() - 0.5) * 2;
        }
        quantumGeo.setAttribute('position', new THREE.BufferAttribute(quantumPositions, 3));
        const quantumMat = new THREE.PointsMaterial({ color: 0xff00ff, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
        const quantumPoints = new THREE.Points(quantumGeo, quantumMat);
        quantumGroup.add(quantumPoints);
        
        // Add a glowing core
        const coreGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xff88ff, transparent: true, blending: THREE.AdditiveBlending })
        );
        quantumGroup.add(coreGlow);
        scene.add(quantumGroup);
        
        // --- Galaxy background (spiral particle system) ---
        const galaxyParticleCount = 8000;
        const galaxyGeo = new THREE.BufferGeometry();
        const galaxyPositions = new Float32Array(galaxyParticleCount * 3);
        const galaxyColors = new Float32Array(galaxyParticleCount * 3);
        for (let i = 0; i < galaxyParticleCount; i++) {
            const radius = Math.pow(Math.random(), 1.2) * 120;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 20 * (1 - radius / 120);
            galaxyPositions[i*3] = Math.cos(angle) * radius;
            galaxyPositions[i*3+1] = y;
            galaxyPositions[i*3+2] = Math.sin(angle) * radius;
            const color = new THREE.Color().setHSL(0.12 + Math.random() * 0.1, 0.9, 0.5);
            galaxyColors[i*3] = color.r;
            galaxyColors[i*3+1] = color.g;
            galaxyColors[i*3+2] = color.b;
        }
        galaxyGeo.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
        galaxyGeo.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));
        const galaxyMatPoints = new THREE.PointsMaterial({ size: 0.2, vertexColors: true, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const galaxy = new THREE.Points(galaxyGeo, galaxyMatPoints);
        scene.add(galaxy);
        
        // --- Universe bubble (cosmic web representation) ---
        const universeGroup = new THREE.Group();
        const webParticleCount = 5000;
        const webGeo = new THREE.BufferGeometry();
        const webPositions = new Float32Array(webParticleCount * 3);
        for (let i = 0; i < webParticleCount; i++) {
            webPositions[i*3] = (Math.random() - 0.5) * 400;
            webPositions[i*3+1] = (Math.random() - 0.5) * 300;
            webPositions[i*3+2] = (Math.random() - 0.5) * 400;
        }
        webGeo.setAttribute('position', new THREE.BufferAttribute(webPositions, 3));
        const webMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.15, transparent: true, opacity: 0.3 });
        const webPoints = new THREE.Points(webGeo, webMat);
        universeGroup.add(webPoints);
        scene.add(universeGroup);
        
        // --- Scale Management (zoom levels: 0=Quantum, 1=Human, 2=Earth, 3=Solar, 4=Galaxy, 5=Universe) ---
        let currentScaleIndex = 0; // Start at quantum
        let targetScaleIndex = 0;
        const scalePositions = [
            { camDist: 1.2, target: [0,0,0], name: "Planck Length", details: "1.6×10⁻³⁵ m | Quantum foam" },
            { camDist: 3.5, target: [0,0,0], name: "Human Scale", details: "1.7 meters | You are here" },
            { camDist: 8, target: [0,0,0], name: "Earth", details: "12,742 km diameter | Our home" },
            { camDist: 25, target: [0,0,0], name: "Solar System", details: "Planets orbiting the Sun" },
            { camDist: 80, target: [0,0,0], name: "Milky Way Galaxy", details: "100,000 light-years across" },
            { camDist: 250, target: [0,0,0], name: "Observable Universe", details: "93 billion light-years" }
        ];
        
        function updateScale() {
            // Smooth interpolation
            currentScaleIndex += (targetScaleIndex - currentScaleIndex) * 0.05;
            const idx = Math.floor(currentScaleIndex);
            const blend = currentScaleIndex - idx;
            const pos1 = scalePositions[Math.min(idx, scalePositions.length-1)];
            const pos2 = scalePositions[Math.min(idx+1, scalePositions.length-1)];
            
            let camDist, targetPos;
            if (pos2 && blend > 0) {
                camDist = pos1.camDist + (pos2.camDist - pos1.camDist) * blend;
                targetPos = new THREE.Vector3(
                    pos1.target[0] + (pos2.target[0] - pos1.target[0]) * blend,
                    pos1.target[1] + (pos2.target[1] - pos1.target[1]) * blend,
                    pos1.target[2] + (pos2.target[2] - pos1.target[2]) * blend
                );
            } else {
                camDist = pos1.camDist;
                targetPos = new THREE.Vector3(pos1.target[0], pos1.target[1], pos1.target[2]);
            }
            
            // Update camera
            const newCamPos = new THREE.Vector3(0, 2, camDist);
            camera.position.lerp(newCamPos, 0.05);
            controls.target.lerp(targetPos, 0.05);
            controls.update();
            
            // Update UI
            let displayIdx = Math.round(currentScaleIndex);
            displayIdx = Math.min(scalePositions.length-1, Math.max(0, displayIdx));
            const info = scalePositions[displayIdx];
            document.getElementById('objName').innerText = info.name;
            document.getElementById('objDetails').innerText = info.details;
            
            // Show/hide objects based on scale
            const showQuantum = currentScaleIndex < 0.5;
            const showHuman = currentScaleIndex > 0.3 && currentScaleIndex < 1.2;
            const showEarth = currentScaleIndex > 0.8 && currentScaleIndex < 2.5;
            const showSolar = currentScaleIndex > 1.5;
            const showGalaxy = currentScaleIndex > 2.5;
            const showUniverse = currentScaleIndex > 3.5;
            
            quantumGroup.visible = showQuantum;
            earth.visible = showEarth;
            planetMeshes.forEach(p => { if (p !== earth) p.visible = showSolar; });
            sun.visible = showSolar;
            galaxy.visible = showGalaxy;
            universeGroup.visible = showUniverse;
            stars.visible = true;
        }
        
        // --- Zoom controls ---
        function setScale(index) {
            targetScaleIndex = Math.min(scalePositions.length-1, Math.max(0, index));
        }
        document.getElementById('btnQuantum').addEventListener('click', () => setScale(0));
        document.getElementById('btnHuman').addEventListener('click', () => setScale(1));
        document.getElementById('btnEarth').addEventListener('click', () => setScale(2));
        document.getElementById('btnSolar').addEventListener('click', () => setScale(3));
        document.getElementById('btnGalaxy').addEventListener('click', () => setScale(4));
        document.getElementById('btnUniverse').addEventListener('click', () => setScale(5));
        
        // Scroll wheel
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY > 0) targetScaleIndex = Math.min(5, targetScaleIndex + 0.08);
            else targetScaleIndex = Math.max(0, targetScaleIndex - 0.08);
        }, { passive: false });
        
        // Touch support
        let touchStart = 0;
        window.addEventListener('touchstart', (e) => { touchStart = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => {
            const delta = (touchStart - e.touches[0].clientY) * 0.005;
            targetScaleIndex = Math.min(5, Math.max(0, targetScaleIndex + delta));
            touchStart = e.touches[0].clientY;
        });
        
        // --- Animation loop: update planet positions, rotations, etc. ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Update planet positions
            planetMeshes.forEach(planet => {
                if (planet.userData && planet.userData.distance) {
                    planet.userData.angle += planet.userData.speed;
                    const x = Math.cos(planet.userData.angle) * planet.userData.distance;
                    const z = Math.sin(planet.userData.angle) * planet.userData.distance;
                    planet.position.set(x, 0, z);
                }
                planet.rotation.y += 0.01;
            });
            earth.rotation.y += 0.005;
            clouds.rotation.y += 0.007;
            sun.rotation.y += 0.002;
            
            // Rotate galaxy and quantum particles
            galaxy.rotation.y += 0.0005;
            galaxy.rotation.x = Math.sin(time * 0.05) * 0.05;
            quantumGroup.rotation.y += 0.01;
            quantumGroup.rotation.x = Math.sin(time * 2) * 0.1;
            universeGroup.rotation.y -= 0.0002;
            
            updateScale();
            effectComposer.render();
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✨ Universe ready | Drag to explore | Scroll through scales');
    </script>
</body>
</html>
