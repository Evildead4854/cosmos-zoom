<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scale of the Universe | 2D Interactive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #020210);
            font-family: 'Space Grotesk', sans-serif;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 10, 25, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 24px 28px 32px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #88aaff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.6;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }
        /* main visual area */
        .visual-area {
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .object-card {
            text-align: center;
            margin-bottom: 20px;
        }
        .object-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #aaffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .object-size {
            font-size: 1rem;
            font-family: monospace;
            color: #aaf;
            margin-top: 6px;
        }
        .object-desc {
            font-size: 0.8rem;
            opacity: 0.7;
            max-width: 400px;
            margin: 8px auto 0;
        }
        canvas {
            display: block;
            margin: 20px auto;
            background: radial-gradient(circle, #0a0a1a, #000000);
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            width: 100%;
            height: auto;
            border: 1px solid rgba(0,242,255,0.2);
        }
        /* slider & ruler */
        .ruler-container {
            margin: 25px 0 20px;
            position: relative;
        }
        .scale-ruler {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-bottom: 5px;
        }
        .ruler-tick {
            font-size: 0.6rem;
            color: #8af;
            text-align: center;
            flex: 1;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: linear-gradient(90deg, #ff44ff, #44aaff, #ffaa44);
            height: 4px;
            border-radius: 4px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            border: 2px solid #0af;
            box-shadow: 0 0 8px #0af;
            cursor: pointer;
        }
        .legend {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.7rem;
            opacity: 0.7;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 18px;
        }
        .legend span {
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 40px;
        }
        button {
            background: rgba(0,242,255,0.15);
            border: 1px solid rgba(0,242,255,0.5);
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #0af;
            color: #000;
            border-color: #0af;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            .object-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✦ SCALE OF THE UNIVERSE ✦</h1>
    <div class="sub">from quantum foam to the cosmic horizon — logarithmic journey</div>

    <div class="visual-area">
        <div class="object-card">
            <div class="object-name" id="objectName">Planck Length</div>
            <div class="object-size" id="objectSize">1.6 × 10⁻³⁵ m</div>
            <div class="object-desc" id="objectDesc">The smallest meaningful length — quantum foam</div>
        </div>
        <canvas id="scaleCanvas" width="800" height="280" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/280"></canvas>
    </div>

    <div class="ruler-container">
        <div class="scale-ruler" id="rulerLabels"></div>
        <input type="range" id="scaleSlider" min="0" max="100" value="45" step="1">
    </div>
    <div class="controls">
        <button id="btnQuantum">⚛️ Quantum</button>
        <button id="btnHuman">🧬 Human</button>
        <button id="btnEarth">🌍 Earth</button>
        <button id="btnSolar">☀️ Solar System</button>
        <button id="btnGalaxy">🌀 Galaxy</button>
        <button id="btnUniverse">🌌 Universe</button>
    </div>
    <div class="legend">
        <span>⬅️ Smaller (Quantum realm)</span>
        <span>✨ Drag slider → explore scales ✨</span>
        <span>Larger (Cosmic web) ➡️</span>
    </div>
</div>

<script>
    // ---------- SCALE DATA: from 10^-35 to 10^27 meters (logarithmic) ----------
    // Each object: name, size in meters (scientific string), exponent (log10), description, color hint
    const scaleItems = [
        { name: "Planck Length", size: "1.6 × 10⁻³⁵ m", exp: -35, desc: "Quantum foam, the fabric of spacetime", color: "#ff66cc" },
        { name: "Neutrino", size: "10⁻²⁴ m", exp: -24, desc: "Ghost particle, passes through matter", color: "#ff99ff" },
        { name: "Quark", size: "10⁻¹⁸ m", exp: -18, desc: "Fundamental constituent of matter", color: "#cc88ff" },
        { name: "Proton", size: "1.7 × 10⁻¹⁵ m", exp: -15, desc: "Nuclear particle, inside atoms", color: "#aa88ff" },
        { name: "Hydrogen Atom", size: "1.0 × 10⁻¹⁰ m", exp: -10, desc: "Electron cloud around nucleus", color: "#88aaff" },
        { name: "DNA Helix", size: "2 × 10⁻⁹ m", exp: -9, desc: "Blueprint of life", color: "#66ffaa" },
        { name: "Virus", size: "1 × 10⁻⁷ m", exp: -7, desc: "Invisible invader", color: "#88ff88" },
        { name: "Red Blood Cell", size: "8 × 10⁻⁶ m", exp: -5, desc: "Oxygen carrier", color: "#ff8866" },
        { name: "Ant", size: "5 × 10⁻³ m", exp: -2.3, desc: "Tiny insect", color: "#ffaa66" },
        { name: "Human", size: "1.7 m", exp: 0, desc: "You are here", color: "#ffffff" },
        { name: "Blue Whale", size: "30 m", exp: 1.5, desc: "Largest animal", color: "#88ccff" },
        { name: "Mount Everest", size: "8.8 km", exp: 3.9, desc: "Earth's highest peak", color: "#aaffcc" },
        { name: "Earth", size: "12,742 km", exp: 7.1, desc: "Our home planet", color: "#44aaff" },
        { name: "Jupiter", size: "139,820 km", exp: 8.1, desc: "Gas giant", color: "#ffaa88" },
        { name: "The Sun", size: "1.39 × 10⁶ km", exp: 9.1, desc: "Our star, fusion reactor", color: "#ffaa44" },
        { name: "Solar System", size: "287 billion km", exp: 12.4, desc: "Sun and planetary family", color: "#ffdd88" },
        { name: "Light Year", size: "9.46 trillion km", exp: 15.9, desc: "Distance light travels in a year", color: "#ffccaa" },
        { name: "Orion Nebula", size: "24 light-years", exp: 17.4, desc: "Star nursery", color: "#ff88cc" },
        { name: "Milky Way", size: "100,000 ly", exp: 21, desc: "Our galaxy", color: "#cc99ff" },
        { name: "Local Group", size: "10 million ly", exp: 23, desc: "Galactic neighborhood", color: "#aa88ff" },
        { name: "Virgo Supercluster", size: "110 million ly", exp: 24, desc: "Galactic filament", color: "#88aaff" },
        { name: "Observable Universe", size: "93 billion ly", exp: 26.9, desc: "The cosmic horizon", color: "#3366ff" }
    ];

    // map exponent range -35 .. 27 to slider 0..100
    const minExp = -35;
    const maxExp = 27;
    function expToSlider(exp) {
        return ((exp - minExp) / (maxExp - minExp)) * 100;
    }
    function sliderToExp(val) {
        return minExp + (val / 100) * (maxExp - minExp);
    }

    // find closest item by exponent
    function getItemByExponent(exp) {
        let closest = scaleItems[0];
        let minDiff = Math.abs(scaleItems[0].exp - exp);
        for (let i = 1; i < scaleItems.length; i++) {
            const diff = Math.abs(scaleItems[i].exp - exp);
            if (diff < minDiff) {
                minDiff = diff;
                closest = scaleItems[i];
            }
        }
        return closest;
    }

    // DOM elements
    const slider = document.getElementById('scaleSlider');
    const objectNameSpan = document.getElementById('objectName');
    const objectSizeSpan = document.getElementById('objectSize');
    const objectDescSpan = document.getElementById('objectDesc');
    const canvas = document.getElementById('scaleCanvas');
    const ctx = canvas.getContext('2d');

    // resize canvas resolution (keep crisp)
    function resizeCanvas() {
        const container = canvas.parentElement;
        const width = Math.min(800, container.clientWidth - 20);
        canvas.width = width;
        canvas.height = 280;
        drawCanvas();
    }
    window.addEventListener('resize', () => resizeCanvas());
    
    // draw logarithmic ruler and a marker + visual representation of current object size relative to human scale?
    // Draw a horizontal "scale bar" with ticks at important exponents, and a glowing dot for current object.
    function drawCanvas() {
        if (!ctx) return;
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        
        // background gradient
        const grad = ctx.createLinearGradient(0, 0, w, 0);
        grad.addColorStop(0, '#0a0a2a');
        grad.addColorStop(1, '#010118');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        
        // draw ruler line
        const yLine = h - 70;
        ctx.beginPath();
        ctx.moveTo(30, yLine);
        ctx.lineTo(w - 30, yLine);
        ctx.strokeStyle = '#88aaff';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // draw ticks for key exponents: -35, -20, -10, 0, 10, 20, 27
        const keyExps = [-35, -20, -10, 0, 10, 20, 27];
        keyExps.forEach(exp => {
            const x = 30 + ((exp - minExp) / (maxExp - minExp)) * (w - 60);
            ctx.beginPath();
            ctx.moveTo(x, yLine - 6);
            ctx.lineTo(x, yLine + 6);
            ctx.strokeStyle = '#aaf';
            ctx.stroke();
            // label
            let label = '';
            if (exp === -35) label = 'Planck';
            else if (exp === -20) label = '10⁻²⁰';
            else if (exp === -10) label = 'Atom';
            else if (exp === 0) label = 'Human';
            else if (exp === 10) label = 'Star';
            else if (exp === 20) label = 'Galaxy';
            else if (exp === 27) label = 'Universe';
            ctx.fillStyle = '#ccddff';
            ctx.font = '10px "Space Grotesk", monospace';
            ctx.fillText(label, x - 20, yLine - 8);
        });
        
        // get current exponent from slider
        const sliderVal = parseFloat(slider.value);
        const currentExp = sliderToExp(sliderVal);
        const currentItem = getItemByExponent(currentExp);
        
        // draw glowing marker on ruler
        const markerX = 30 + ((currentExp - minExp) / (maxExp - minExp)) * (w - 60);
        ctx.shadowBlur = 12;
        ctx.shadowColor = currentItem.color;
        ctx.beginPath();
        ctx.arc(markerX, yLine, 8, 0, Math.PI * 2);
        ctx.fillStyle = currentItem.color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(markerX, yLine, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // ---- visual metaphor: draw a circle representing relative "size impression" but scaled logarithmically (just artistic)
        const centerX = w / 2;
        const centerY = h / 2 - 15;
        // map exponent to radius: smaller exponent -> tiny radius, larger -> huge, but clamped
        let radius = 20;
        if (currentExp < -20) radius = 6;
        else if (currentExp < -5) radius = 12;
        else if (currentExp < 0) radius = 18;
        else if (currentExp < 5) radius = 28;
        else if (currentExp < 10) radius = 38;
        else if (currentExp < 15) radius = 50;
        else radius = 70;
        // make it look like a stylized object
        ctx.shadowBlur = 15;
        ctx.shadowColor = currentItem.color;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.fillStyle = currentItem.color + '40';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = currentItem.color + 'aa';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // label inside
        ctx.font = 'bold 12px "Space Grotesk"';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 0;
        ctx.fillText('⚛', centerX-6, centerY+5);
        
        // add comparison text: "billions of times smaller/larger"
        let comparison = '';
        if (currentExp < -10) comparison = '🔬 billions of times smaller than a human hair';
        else if (currentExp < 0) comparison = '🧬 microscopic realm';
        else if (currentExp < 5) comparison = '📏 human to mountain scale';
        else if (currentExp < 12) comparison = '🌍 planetary to stellar scale';
        else if (currentExp < 20) comparison = '🌀 galactic scale — unimaginable distances';
        else comparison = '🌌 cosmic scale — the observable universe';
        ctx.font = '10px monospace';
        ctx.fillStyle = '#bbccff';
        ctx.fillText(comparison, centerX - 130, yLine - 25);
    }
    
    // update UI based on slider value
    function updateFromSlider() {
        const val = parseFloat(slider.value);
        const exp = sliderToExp(val);
        const item = getItemByExponent(exp);
        objectNameSpan.innerText = item.name;
        objectSizeSpan.innerText = item.size;
        objectDescSpan.innerText = item.desc;
        drawCanvas();
        // also update slider background? just visual
    }
    
    // jump to specific item index
    function jumpToItem(index) {
        if (index >= 0 && index < scaleItems.length) {
            const targetExp = scaleItems[index].exp;
            const sliderVal = expToSlider(targetExp);
            slider.value = sliderVal;
            updateFromSlider();
        }
    }
    
    // buttons
    document.getElementById('btnQuantum').addEventListener('click', () => jumpToItem(0));   // Planck
    document.getElementById('btnHuman').addEventListener('click', () => {
        const humanIdx = scaleItems.findIndex(i => i.name === "Human");
        jumpToItem(humanIdx);
    });
    document.getElementById('btnEarth').addEventListener('click', () => {
        const earthIdx = scaleItems.findIndex(i => i.name === "Earth");
        jumpToItem(earthIdx);
    });
    document.getElementById('btnSolar').addEventListener('click', () => {
        const solarIdx = scaleItems.findIndex(i => i.name === "Solar System");
        jumpToItem(solarIdx);
    });
    document.getElementById('btnGalaxy').addEventListener('click', () => {
        const galaxyIdx = scaleItems.findIndex(i => i.name === "Milky Way");
        jumpToItem(galaxyIdx);
    });
    document.getElementById('btnUniverse').addEventListener('click', () => {
        const uniIdx = scaleItems.findIndex(i => i.name === "Observable Universe");
        jumpToItem(uniIdx);
    });
    
    slider.addEventListener('input', updateFromSlider);
    
    // build ruler labels under slider (simple)
    const rulerDiv = document.getElementById('rulerLabels');
    function buildRulerLabels() {
        rulerDiv.innerHTML = '';
        const markers = [
            { exp: -35, label: '⚛️ Planck' },
            { exp: -10, label: 'Atom' },
            { exp: 0, label: 'Human' },
            { exp: 7.1, label: 'Earth' },
            { exp: 12.4, label: 'Solar' },
            { exp: 21, label: 'Galaxy' },
            { exp: 26.9, label: 'Universe' }
        ];
        markers.forEach(m => {
            const pos = ((m.exp - minExp) / (maxExp - minExp)) * 100;
            const tick = document.createElement('div');
            tick.className = 'ruler-tick';
            tick.style.position = 'relative';
            tick.style.left = `calc(${pos}% - 30px)`;
            tick.style.width = '60px';
            tick.style.textAlign = 'center';
            tick.innerText = m.label;
            rulerDiv.appendChild(tick);
        });
    }
    buildRulerLabels();
    
    // initial draw
    resizeCanvas();
    updateFromSlider();
    
    // optional: subtle animation, show a small intro
    console.log('Scale of the Universe — 2D interactive | From 10⁻³⁵ to 10²⁷ meters');
</script>
</body>
</html>
