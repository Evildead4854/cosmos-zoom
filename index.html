<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D N‑Body Gravity | Real Orbital Mechanics</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border-left: 4px solid #ffaa44;
            z-index: 100;
            pointer-events: none;
            color: white;
            max-width: 280px;
        }
        .title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ffaa44;
            margin-bottom: 5px;
        }
        .stats {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 5px 0;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 100;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
        }
        button:hover {
            background: #ffaa44;
            color: black;
            border-color: #ffaa44;
        }
        .slider-container {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 20px;
            pointer-events: auto;
            color: white;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .slider-container label {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        input {
            width: 140px;
            cursor: pointer;
        }
        .instruction {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: #aaa;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .controls { gap: 6px; padding: 8px 12px; }
            button { padding: 4px 8px; font-size: 0.6rem; }
            .slider-container { bottom: 80px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="title">✦ N‑BODY GRAVITY ENGINE ✦</div>
        <div class="stats" id="bodyCount">Bodies: 5</div>
        <div id="infoText" style="font-size:0.7rem; opacity:0.7;">Real physics | No fixed orbits</div>
    </div>
    <div class="slider-container">
        <label>🌌 Gravity (G) <span id="gVal">1.0</span><input type="range" id="gravitySlider" min="0.2" max="2.0" step="0.01" value="1.0"></label>
        <label>⏱️ Time speed <span id="timeVal">1.0</span><input type="range" id="timeSlider" min="0" max="2.5" step="0.01" value="1.0"></label>
    </div>
    <div class="controls">
        <button id="spawnBtn">☄️ Spawn Asteroid</button>
        <button id="resetBtn">⟳ Reset System</button>
    </div>
    <div class="instruction">🖱️ Drag to rotate | Scroll to zoom | Real gravity simulation</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Setup Scene with Logarithmic Depth Buffer (mandatory for space scales) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 1e9);
        camera.position.set(0, 20, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Post-processing bloom for stars/planets
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.3, 0.2);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.4;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 0.8;
        controls.enablePan = true;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4466ff, 0.3);
        fillLight.position.set(-3, 2, -5);
        scene.add(fillLight);

        // --- Starfield background (static, for depth) ---
        const starCount = 4000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 500, (Math.random() - 0.5) * 300 - 150);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Helper: create a sphere with optional glow ---
        function createBody(radius, color, emissive = 0x000000, emissiveIntensity = 0) {
            const material = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity, roughness: 0.4, metalness: 0.1 });
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 64, 64), material);
            mesh.castShadow = true;
            mesh.receiveShadow = false;
            return mesh;
        }

        // --- Gravitational constant (real world: 6.67430e-11, but scaled for simulation) ---
        let G = 0.8;        // tuned for visual stability
        let timeScale = 1.0;
        
        // --- Body class: position, velocity, mass, visual, trail ---
        class Body {
            constructor(name, mass, radius, color, pos, vel, emissive = false) {
                this.name = name;
                this.mass = mass;
                this.radius = radius;
                this.color = color;
                this.pos = pos.clone();
                this.vel = vel.clone();
                this.acc = new THREE.Vector3(0, 0, 0);
                this.mesh = createBody(radius, color, emissive ? 0xff4422 : 0x000000, emissive ? 0.6 : 0);
                this.mesh.userData = { body: this };
                scene.add(this.mesh);
                // Trail history (positions for line)
                this.trailPositions = [];
                this.maxTrail = 200;
                this.trailLine = null;
                this.initTrail();
            }
            
            initTrail() {
                const material = new THREE.LineBasicMaterial({ color: this.color });
                const geometry = new THREE.BufferGeometry();
                this.trailLine = new THREE.Line(geometry, material);
                scene.add(this.trailLine);
            }
            
            updateTrail() {
                this.trailPositions.push(this.pos.clone());
                if (this.trailPositions.length > this.maxTrail) this.trailPositions.shift();
                const points = this.trailPositions.map(p => p.clone());
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                this.trailLine.geometry.dispose();
                this.trailLine.geometry = geometry;
            }
            
            updateVisual() {
                this.mesh.position.copy(this.pos);
            }
            
            remove() {
                scene.remove(this.mesh);
                scene.remove(this.trailLine);
                if (this.trailLine.geometry) this.trailLine.geometry.dispose();
            }
        }

        // --- Simulation state ---
        let bodies = [];
        let nextId = 0;
        
        // --- Gravity force calculation (Newton's law) ---
        function computeAccelerations() {
            // Reset accelerations
            bodies.forEach(b => b.acc.set(0, 0, 0));
            
            // For each pair, compute gravitational force
            for (let i = 0; i < bodies.length; i++) {
                for (let j = i + 1; j < bodies.length; j++) {
                    const a = bodies[i];
                    const b = bodies[j];
                    const diff = new THREE.Vector3().subVectors(b.pos, a.pos);
                    const distSq = diff.lengthSq();
                    const dist = Math.sqrt(distSq);
                    // Avoid extreme forces when too close (softening)
                    const softeningSq = 1.5;
                    const forceMag = (G * a.mass * b.mass) / (distSq + softeningSq);
                    const direction = diff.clone().divideScalar(dist);
                    const forceVec = direction.multiplyScalar(forceMag);
                    
                    // a gets force towards b, b gets opposite
                    const accA = forceVec.clone().divideScalar(a.mass);
                    const accB = forceVec.clone().negate().divideScalar(b.mass);
                    a.acc.add(accA);
                    b.acc.add(accB);
                }
            }
        }
        
        // --- Integration (Semi-implicit Euler) ---
        function updatePhysics(dt) {
            const dtScaled = dt * timeScale;
            computeAccelerations();
            bodies.forEach(body => {
                body.vel.x += body.acc.x * dtScaled;
                body.vel.y += body.acc.y * dtScaled;
                body.vel.z += body.acc.z * dtScaled;
                body.pos.x += body.vel.x * dtScaled;
                body.pos.y += body.vel.y * dtScaled;
                body.pos.z += body.vel.z * dtScaled;
                body.updateVisual();
                body.updateTrail();
            });
        }
        
        // --- Initialize a stable solar system (star + planets with orbital velocities) ---
        function initSystem() {
            // Remove existing bodies
            bodies.forEach(b => b.remove());
            bodies = [];
            
            // Central star (massive)
            const starMass = 200.0;
            const star = new Body("Star", starMass, 1.8, 0xffaa66, new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 0), true);
            bodies.push(star);
            
            // Helper: circular orbital velocity for a given distance from star
            function orbitalVelocity(starMass, distance) {
                const v = Math.sqrt((G * starMass) / distance);
                // Random direction in XZ plane
                const angle = Math.random() * Math.PI * 2;
                return new THREE.Vector3(Math.cos(angle) * v, 0, Math.sin(angle) * v);
            }
            
            // Planet 1: close, fast
            const p1Mass = 2.5;
            const p1Dist = 7;
            const p1Vel = orbitalVelocity(starMass, p1Dist);
            const p1 = new Body("Planet A", p1Mass, 0.45, 0x88aaff, new THREE.Vector3(p1Dist, 0, 0), p1Vel);
            bodies.push(p1);
            
            // Planet 2: medium
            const p2Mass = 3.2;
            const p2Dist = 12;
            const p2Vel = orbitalVelocity(starMass, p2Dist);
            const p2 = new Body("Planet B", p2Mass, 0.55, 0xffaa88, new THREE.Vector3(0, 0, p2Dist), p2Vel);
            bodies.push(p2);
            
            // Planet 3: farther, slightly inclined
            const p3Mass = 4.0;
            const p3Dist = 18;
            const p3Vel = orbitalVelocity(starMass, p3Dist);
            const p3 = new Body("Planet C", p3Mass, 0.65, 0x88ffaa, new THREE.Vector3(p3Dist * 0.7, 2, p3Dist * 0.7), p3Vel);
            bodies.push(p3);
            
            // Planet 4: gas giant style
            const p4Mass = 8.0;
            const p4Dist = 25;
            const p4Vel = orbitalVelocity(starMass, p4Dist);
            const p4 = new Body("Planet D", p4Mass, 0.9, 0xdd8866, new THREE.Vector3(0, -1, p4Dist), p4Vel);
            bodies.push(p4);
            
            updateUICount();
        }
        
        // --- Spawn an asteroid with random position and velocity ---
        function spawnAsteroid() {
            const star = bodies[0];
            if (!star) return;
            const dist = 12 + Math.random() * 20;
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * dist;
            const z = Math.sin(angle) * dist;
            const y = (Math.random() - 0.5) * 5;
            const pos = new THREE.Vector3(x, y, z);
            // Velocity: tangential + random perturbation
            const directionToStar = new THREE.Vector3().subVectors(star.pos, pos).normalize();
            const tangent = new THREE.Vector3(-directionToStar.z, 0, directionToStar.x);
            const orbitalSpeed = Math.sqrt((G * star.mass) / dist);
            const vel = tangent.multiplyScalar(orbitalSpeed * (0.8 + Math.random() * 0.6));
            vel.y += (Math.random() - 0.5) * 1.5;
            const mass = 0.6 + Math.random() * 1.2;
            const radius = 0.25 + Math.random() * 0.2;
            const color = 0xaa8866;
            const asteroid = new Body("Asteroid", mass, radius, color, pos, vel);
            bodies.push(asteroid);
            updateUICount();
        }
        
        function updateUICount() {
            document.getElementById('bodyCount').innerHTML = `Bodies: ${bodies.length}`;
        }
        
        // --- Reset simulation ---
        function resetSimulation() {
            initSystem();
        }
        
        // --- UI event binding ---
        document.getElementById('gravitySlider').addEventListener('input', (e) => {
            G = parseFloat(e.target.value);
            document.getElementById('gVal').innerText = G.toFixed(2);
        });
        document.getElementById('timeSlider').addEventListener('input', (e) => {
            timeScale = parseFloat(e.target.value);
            document.getElementById('timeVal').innerText = timeScale.toFixed(2);
        });
        document.getElementById('spawnBtn').addEventListener('click', () => spawnAsteroid());
        document.getElementById('resetBtn').addEventListener('click', () => resetSimulation());
        
        // --- Animation loop with fixed timestep for physics stability ---
        let lastTime = performance.now();
        let accumulator = 0;
        const physicsStep = 1 / 60; // 60 Hz physics
        
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            accumulator += dt;
            
            // Run physics at fixed steps to keep integration stable
            while (accumulator >= physicsStep) {
                updatePhysics(physicsStep);
                accumulator -= physicsStep;
            }
            
            // Update camera controls
            controls.update();
            
            // Rotate star for visual effect
            if (bodies[0]) bodies[0].mesh.rotation.y += 0.01;
            
            // Slight star glow pulse
            const starMesh = bodies[0]?.mesh;
            if (starMesh && starMesh.material) {
                const intensity = 0.6 + Math.sin(Date.now() * 0.003) * 0.1;
                starMesh.material.emissiveIntensity = intensity;
            }
            
            effectComposer.render();
            requestAnimationFrame(animate);
        }
        
        // --- Start simulation ---
        initSystem();
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('3D N-Body Gravity Engine started | Real Newtonian physics | Orbital trails visible');
    </script>
</body>
</html>
