<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Scale N-Body Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,20,20,0.8); padding: 20px; border: 1px solid #00ffcc; pointer-events: none; }
        h1 { margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; }
        p { margin: 5px 0; font-size: 12px; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        button { background: #002222; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>System Status: N-Body Active</h1>
        <p>Simulation Speed: 1.5 Days / Frame</p>
        <p>Integration: Semi-Implicit Euler</p>
        <p id="target-info">Target: SYSTEM CENTER</p>
        <p style="color: #ff5555; margin-top: 15px;">WARNING: TRUE SCALE.<br>Planets are invisible from a distance.<br>Use buttons to lock camera.</p>
    </div>
    
    <div class="controls">
        <button onclick="setTarget('Sun')">Sun</button>
        <button onclick="setTarget('Mercury')">Mercury</button>
        <button onclick="setTarget('Venus')">Venus</button>
        <button onclick="setTarget('Earth')">Earth</button>
        <button onclick="setTarget('Mars')">Mars</button>
        <button onclick="setTarget('Jupiter')">Jupiter</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. ENGINE SETUP (Logarithmic Depth is MANDATORY for Space) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.0000001, 10000);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            logarithmicDepthBuffer: true // THE SECRET SAUCE FOR UNIVERSE SCALES
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- 2. ASTROPHYSICS CONSTANTS ---
        // We use the Astronomical System of Units to prevent floating point explosion
        // Mass = Solar Masses (Sun = 1)
        // Distance = Astronomical Units (1 AU = 149.6 million km)
        // Time = Years
        const G = 39.478; // Gravitational Constant in AU^3 / (M_sun * yr^2)
        const dt = 0.004; // Time step per frame (~1.46 days)

        const bodies = [];
        const trails = [];

        // --- 3. PROCEDURAL GENERATORS ---
        function createStarfield() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(30000 * 3);
            for(let i=0; i<90000; i++) pos[i] = (Math.random() - 0.5) * 2000;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6});
            scene.add(new THREE.Points(geo, mat));
        }
        createStarfield();

        const texLoader = new THREE.TextureLoader();

        // Object Factory
        function createCelestialBody(name, mass, radiusAU, distAU, color, hasLight = false) {
            // High-segment sphere for crisp rendering up close
            const geo = new THREE.SphereGeometry(radiusAU, 64, 64);
            let mat;
            
            if(hasLight) {
                mat = new THREE.MeshBasicMaterial({ color: color });
                const light = new THREE.PointLight(0xffffff, 1.5, 0, 0); // Infinite range
                scene.add(light);
            } else {
                mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 });
            }

            const mesh = new THREE.Mesh(geo, mat);
            
            // Calculate orbital velocity for circular orbit (v = sqrt(G*M/r))
            // This is just the starting push. Gravity takes over immediately.
            let velZ = distAU > 0 ? Math.sqrt(G * 1.0 / distAU) : 0;

            mesh.position.set(distAU, 0, 0);
            scene.add(mesh);

            // Create Trail
            const trailGeo = new THREE.BufferGeometry();
            const trailMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 });
            const trail = new THREE.Line(trailGeo, trailMat);
            scene.add(trail);

            const body = {
                name: name,
                mesh: mesh,
                mass: mass,
                radius: radiusAU,
                vel: new THREE.Vector3(0, 0, velZ),
                acc: new THREE.Vector3(0, 0, 0),
                path: [], // Store history for trail
                trailLine: trail
            };

            bodies.push(body);
            return body;
        }

        // --- 4. THE REAL SOLAR SYSTEM DATA ---
        scene.add(new THREE.AmbientLight(0x222222));

        // Sun: Mass = 1, Radius = 696,000 km (0.00465 AU)
        createCelestialBody("Sun", 1.0, 0.00465, 0, 0xffddaa, true);

        // Mercury: Mass = 1.65e-7, Radius = 2,439 km, Dist = 0.387 AU
        createCelestialBody("Mercury", 1.65e-7, 0.0000163, 0.387, 0xaaaaaa);

        // Venus: Mass = 2.44e-6, Radius = 6,051 km, Dist = 0.723 AU
        createCelestialBody("Venus", 2.44e-6, 0.0000404, 0.723, 0xffcc88);

        // Earth: Mass = 3.00e-6, Radius = 6,371 km, Dist = 1.0 AU
        createCelestialBody("Earth", 3.00e-6, 0.0000425, 1.0, 0x4488ff);

        // Mars: Mass = 3.21e-7, Radius = 3,389 km, Dist = 1.524 AU
        createCelestialBody("Mars", 3.21e-7, 0.0000226, 1.524, 0xff4422);

        // Jupiter: Mass = 0.00095, Radius = 69,911 km, Dist = 5.204 AU
        createCelestialBody("Jupiter", 0.00095, 0.000467, 5.204, 0xccaa88);

        // --- 5. CAMERA TARGETING SYSTEM ---
        let targetBody = null;
        camera.position.set(0, 2, 6); // Start looking at inner solar system

        window.setTarget = function(name) {
            const body = bodies.find(b => b.name === name);
            if (body) {
                targetBody = body;
                document.getElementById('target-info').innerText = "Target: " + name;
                // Move camera close to the planet based on its true size
                const offset = body.radius * 5; 
                camera.position.copy(body.mesh.position).add(new THREE.Vector3(offset, offset, offset));
            }
        };

        // --- 6. THE PHYSICS ENGINE (N-Body Loop) ---
        function animate() {
            requestAnimationFrame(animate);

            // Step 1: Calculate Gravity between ALL objects
            for (let i = 0; i < bodies.length; i++) {
                let bodyA = bodies[i];
                let force = new THREE.Vector3(0, 0, 0);

                for (let j = 0; j < bodies.length; j++) {
                    if (i === j) continue;
                    let bodyB = bodies[j];

                    // Find distance and direction
                    let diff = new THREE.Vector3().subVectors(bodyB.mesh.position, bodyA.mesh.position);
                    let distSq = diff.lengthSq();
                    
                    // F = G * (m1 * m2) / r^2
                    let fMag = (G * bodyA.mass * bodyB.mass) / distSq;
                    
                    // Add force vector
                    force.add(diff.normalize().multiplyScalar(fMag));
                }
                // Convert force to acceleration (a = F/m)
                bodyA.acc.copy(force.divideScalar(bodyA.mass));
            }

            // Step 2: Apply Acceleration to Velocity, and Velocity to Position (Euler Integration)
            for (let i = 0; i < bodies.length; i++) {
                let body = bodies[i];
                
                // If it's the Sun, keep it anchored for viewing stability (optional, but good for this scale)
                if (body.name === "Sun") continue; 

                body.vel.addScaledVector(body.acc, dt);
                body.mesh.position.addScaledVector(body.vel, dt);

                // Update Trails (Record position every few frames)
                if (Math.random() > 0.8) {
                    body.path.push(body.mesh.position.clone());
                    if (body.path.length > 300) body.path.shift(); // Max trail length
                    body.trailLine.geometry.setFromPoints(body.path);
                }
            }

            // Step 3: Handle Camera Focus
            if (targetBody) {
                controls.target.copy(targetBody.mesh.position);
                // Dynamically adjust camera zoom speed based on object scale
                controls.minDistance = targetBody.radius * 1.5;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
