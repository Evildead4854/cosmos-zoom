<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scale of the Universe | Interactive Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #050510, #000000);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            color: #f0f0f0;
        }
        /* main container */
        .explorer {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }
        /* info card */
        .info-panel {
            background: rgba(10, 10, 25, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 1.5rem 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
        }
        .category {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #0af;
            margin-bottom: 0.5rem;
        }
        .object-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #8af);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0.25rem 0;
        }
        .object-size {
            font-size: 1rem;
            font-family: monospace;
            color: #bbddff;
            margin: 0.5rem 0;
        }
        .object-desc {
            font-size: 0.85rem;
            opacity: 0.8;
            max-width: 400px;
            margin: 0 auto;
        }
        /* visual canvas */
        .visual-container {
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            padding: 1rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(circle at 30% 40%, #0a0a1a, #000000);
            border-radius: 1.5rem;
            width: 100%;
            height: auto;
            max-width: 700px;
            aspect-ratio: 700 / 400;
            box-shadow: 0 0 30px rgba(0,150,255,0.2);
        }
        /* slider & ruler */
        .ruler-section {
            width: 100%;
            max-width: 800px;
            margin: 1rem 0;
        }
        .scale-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.65rem;
            color: #8af;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: linear-gradient(90deg, #f4f, #0af, #ffa);
            height: 4px;
            border-radius: 4px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 2px solid #0af;
            box-shadow: 0 0 10px #0af;
            cursor: pointer;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin: 1.5rem 0 1rem;
        }
        .scale-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .scale-btn:hover {
            background: #0af;
            color: #000;
            border-color: #0af;
            transform: scale(1.02);
        }
        .scroll-hint {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 1rem;
            letter-spacing: 1px;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.65rem;
            opacity: 0.4;
            text-align: center;
        }
        @media (max-width: 700px) {
            .object-name { font-size: 1.6rem; }
            .info-panel { padding: 1rem; }
            .scale-btn { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="explorer">
    <div class="info-panel">
        <div class="category" id="category">⚛️ QUANTUM REALM</div>
        <div class="object-name" id="objectName">Planck Length</div>
        <div class="object-size" id="objectSize">1.6 × 10⁻³⁵ m</div>
        <div class="object-desc" id="objectDesc">The smallest measurable length — quantum foam</div>
    </div>

    <div class="visual-container">
        <canvas id="scaleCanvas" width="700" height="400" style="width:100%; height:auto; aspect-ratio:700/400"></canvas>
    </div>

    <div class="ruler-section">
        <div class="scale-labels">
            <span>⚛️ Planck</span><span>🧬 Atom</span><span>👤 Human</span><span>🌍 Earth</span><span>☀️ Solar</span><span>🌀 Galaxy</span><span>🌌 Universe</span>
        </div>
        <input type="range" id="scaleSlider" min="0" max="100" value="40" step="1">
    </div>

    <div class="button-group">
        <button class="scale-btn" data-index="0">⚛️ Quantum</button>
        <button class="scale-btn" data-index="4">🧬 Atom</button>
        <button class="scale-btn" data-index="9">👤 Human</button>
        <button class="scale-btn" data-index="12">🌍 Earth</button>
        <button class="scale-btn" data-index="15">☀️ Solar System</button>
        <button class="scale-btn" data-index="18">🌀 Galaxy</button>
        <button class="scale-btn" data-index="21">🌌 Universe</button>
    </div>
    <div class="scroll-hint">✨ SCROLL UP / DOWN — or drag slider — to travel through scales ✨</div>
    <footer>logarithmic scale | 22 objects from Planck to Observable Universe</footer>
</div>

<script>
    // ---------- SCALE DATA (exponents from -35 to 27) ----------
    const scaleItems = [
        { name: "Planck Length", size: "1.6 × 10⁻³⁵ m", exp: -35, desc: "Quantum foam, the fabric of spacetime", category: "⚛️ QUANTUM REALM", type: "quantum", color: "#ff66cc" },
        { name: "Neutrino", size: "10⁻²⁴ m", exp: -24, desc: "Ghost particle, trillions pass through you", category: "⚛️ PARTICLE PHYSICS", type: "particle", color: "#ff99ff" },
        { name: "Quark", size: "10⁻¹⁸ m", exp: -18, desc: "Fundamental constituent of matter", category: "⚛️ PARTICLE PHYSICS", type: "particle", color: "#cc88ff" },
        { name: "Proton", size: "1.7 × 10⁻¹⁵ m", exp: -15, desc: "Nuclear particle, inside atoms", category: "⚛️ ATOMIC NUCLEUS", type: "nucleus", color: "#aa88ff" },
        { name: "Hydrogen Atom", size: "1.0 × 10⁻¹⁰ m", exp: -10, desc: "Electron cloud around nucleus", category: "🧬 ATOMIC SCALE", type: "atom", color: "#88aaff" },
        { name: "DNA Helix", size: "2 × 10⁻⁹ m", exp: -9, desc: "Blueprint of life", category: "🧬 MOLECULAR", type: "dna", color: "#66ffaa" },
        { name: "Virus", size: "1 × 10⁻⁷ m", exp: -7, desc: "Invisible invader", category: "🦠 MICROSCOPIC", type: "virus", color: "#88ff88" },
        { name: "Red Blood Cell", size: "8 × 10⁻⁶ m", exp: -5, desc: "Oxygen carrier", category: "🦠 BIOLOGICAL", type: "cell", color: "#ff8866" },
        { name: "Ant", size: "5 × 10⁻³ m", exp: -2.3, desc: "Tiny architect", category: "🐜 LIVING WORLD", type: "insect", color: "#ffaa66" },
        { name: "Human", size: "1.7 m", exp: 0, desc: "You are here", category: "👤 HUMAN SCALE", type: "human", color: "#ffffff" },
        { name: "Blue Whale", size: "30 m", exp: 1.5, desc: "Largest animal on Earth", category: "🐋 MEGAFAUNA", type: "whale", color: "#88ccff" },
        { name: "Mount Everest", size: "8.8 km", exp: 3.9, desc: "Earth's highest peak", category: "🏔️ GEOGRAPHIC", type: "mountain", color: "#aaffcc" },
        { name: "Earth", size: "12,742 km", exp: 7.1, desc: "Our home, blue marble", category: "🌍 PLANETARY", type: "planet", color: "#44aaff" },
        { name: "Jupiter", size: "139,820 km", exp: 8.1, desc: "Gas giant, king of planets", category: "🌍 PLANETARY", type: "planet", color: "#ffaa88" },
        { name: "The Sun", size: "1.39 × 10⁶ km", exp: 9.1, desc: "Fusion reactor, our star", category: "☀️ STELLAR", type: "star", color: "#ffaa44" },
        { name: "Solar System", size: "287 billion km", exp: 12.4, desc: "Sun and planetary family", category: "☀️ SOLAR SYSTEM", type: "solar", color: "#ffdd88" },
        { name: "Light Year", size: "9.46 trillion km", exp: 15.9, desc: "Distance light travels in a year", category: "📏 ASTRONOMICAL", type: "distance", color: "#ffccaa" },
        { name: "Orion Nebula", size: "24 light-years", exp: 17.4, desc: "Star nursery, cosmic clouds", category: "🌌 NEBULAE", type: "nebula", color: "#ff88cc" },
        { name: "Milky Way", size: "100,000 ly", exp: 21, desc: "Our galaxy, 100 billion stars", category: "🌀 GALACTIC", type: "galaxy", color: "#cc99ff" },
        { name: "Local Group", size: "10 million ly", exp: 23, desc: "Galactic neighborhood", category: "🌀 GALAXY CLUSTER", type: "cluster", color: "#aa88ff" },
        { name: "Virgo Supercluster", size: "110 million ly", exp: 24, desc: "Galactic filament", category: "🌌 SUPERCLUSTER", type: "cluster", color: "#88aaff" },
        { name: "Observable Universe", size: "93 billion ly", exp: 26.9, desc: "The cosmic horizon", category: "🌌 UNIVERSE", type: "universe", color: "#3366ff" }
    ];

    // min/max exponent for slider mapping
    const minExp = -35;
    const maxExp = 27;
    function expToSlider(exp) { return ((exp - minExp) / (maxExp - minExp)) * 100; }
    function sliderToExp(val) { return minExp + (val / 100) * (maxExp - minExp); }

    function getClosestItem(exp) {
        let closest = scaleItems[0];
        let minDiff = Math.abs(scaleItems[0].exp - exp);
        for (let i = 1; i < scaleItems.length; i++) {
            const diff = Math.abs(scaleItems[i].exp - exp);
            if (diff < minDiff) { minDiff = diff; closest = scaleItems[i]; }
        }
        return closest;
    }

    // DOM elements
    const slider = document.getElementById('scaleSlider');
    const objectNameSpan = document.getElementById('objectName');
    const objectSizeSpan = document.getElementById('objectSize');
    const objectDescSpan = document.getElementById('objectDesc');
    const categorySpan = document.getElementById('category');
    const canvas = document.getElementById('scaleCanvas');
    const ctx = canvas.getContext('2d');

    let currentItem = scaleItems[9]; // human
    let time = 0;
    let animFrame;

    // --- Drawing functions per type (artistic and animated) ---
    function drawQuantum(ctx, cx, cy, color, timeVal) {
        for (let i = 0; i < 120; i++) {
            const angle = (i * 27 + timeVal * 15) % 360;
            const rad = 35 + Math.sin(i * 0.3 + timeVal) * 8;
            const x = cx + Math.cos(angle) * rad;
            const y = cy + Math.sin(angle) * rad;
            ctx.beginPath();
            ctx.arc(x, y, 1.5 + Math.sin(timeVal * 12 + i) * 0.8, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 100, 200, ${0.5 + Math.sin(timeVal*20+i)*0.2})`;
            ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 100, 200, 0.25)`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI*2);
        ctx.fillStyle = `#ff88ff`;
        ctx.fill();
    }

    function drawAtom(ctx, cx, cy, color, timeVal) {
        ctx.beginPath();
        ctx.ellipse(cx, cy, 48, 32, timeVal * 0.5, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(100, 200, 255, 0.5)`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(cx, cy, 40, 26, -timeVal * 0.4, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 14, 0, Math.PI*2);
        ctx.fillStyle = `#ff8866`;
        ctx.fill();
        const orbX = cx + Math.cos(timeVal * 2.8) * 48;
        const orbY = cy + Math.sin(timeVal * 2.2) * 30;
        ctx.beginPath();
        ctx.arc(orbX, orbY, 6, 0, Math.PI*2);
        ctx.fillStyle = `#88ddff`;
        ctx.fill();
    }

    function drawDna(ctx, cx, cy, color, timeVal) {
        for (let i = -1; i <= 1; i++) {
            const offset = i * 1.2;
            for (let t = 0; t <= 1; t += 0.05) {
                const angle = t * Math.PI * 4 + timeVal;
                const x = cx + Math.cos(angle) * 28 + offset * 8;
                const y = cy + (t - 0.5) * 70;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI*2);
                ctx.fillStyle = `rgba(100,255,150,0.7)`;
                ctx.fill();
            }
        }
        ctx.beginPath();
        ctx.moveTo(cx-15, cy-35);
        ctx.lineTo(cx+15, cy-35);
        ctx.lineTo(cx, cy+35);
        ctx.fillStyle = `#66ffaa88`;
        ctx.fill();
    }

    function drawHuman(ctx, cx, cy, color, timeVal) {
        ctx.beginPath();
        ctx.arc(cx, cy-20, 14, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,240,200,0.9)`;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx, cy-6);
        ctx.lineTo(cx, cy+22);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#fff";
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, cy+2);
        ctx.lineTo(cx-14, cy+16);
        ctx.moveTo(cx, cy+2);
        ctx.lineTo(cx+14, cy+16);
        ctx.moveTo(cx, cy+22);
        ctx.lineTo(cx-10, cy+38);
        ctx.moveTo(cx, cy+22);
        ctx.lineTo(cx+10, cy+38);
        ctx.stroke();
    }

    function drawPlanet(ctx, cx, cy, color, timeVal, isEarth=false) {
        ctx.beginPath();
        ctx.arc(cx, cy, 42, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx+12, cy-8, 14, 20, 0, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,0,0,0.3)`;
        ctx.fill();
        if(isEarth) {
            ctx.beginPath();
            ctx.arc(cx, cy, 48, 0, Math.PI*2);
            ctx.fillStyle = `rgba(100,150,255,0.2)`;
            ctx.fill();
        }
    }

    function drawStar(ctx, cx, cy, color, timeVal) {
        const rad = 48 + Math.sin(timeVal * 5) * 5;
        ctx.beginPath();
        ctx.arc(cx, cy, rad, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 180, 80, 0.9)`;
        ctx.fill();
        for (let i=0;i<10;i++) {
            const angle = i * Math.PI*2/10 + timeVal;
            const x = cx + Math.cos(angle) * (rad+8);
            const y = cy + Math.sin(angle) * (rad+8);
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI*2);
            ctx.fillStyle = `#ffaa66`;
            ctx.fill();
        }
    }

    function drawGalaxy(ctx, cx, cy, color, timeVal) {
        for (let i=0;i<300;i++) {
            const angle = i * 0.22 + timeVal;
            const rad = 25 + (i % 100) * 1.1;
            const x = cx + Math.cos(angle) * rad;
            const y = cy + Math.sin(angle) * rad * 0.6;
            ctx.fillStyle = `rgba(200, 160, 255, 0.6)`;
            ctx.fillRect(x, y, 2, 2);
        }
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, Math.PI*2);
        ctx.fillStyle = `#ffccaa`;
        ctx.fill();
    }

    function drawUniverse(ctx, cx, cy, color, timeVal) {
        for (let i=0;i<180;i++) {
            const startX = cx + (Math.sin(i*0.7)*55);
            const startY = cy + (Math.cos(i*0.9)*40);
            const endX = cx + (Math.sin(i*0.7+1.8)*70);
            const endY = cy + (Math.cos(i*0.9+1.2)*48);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `rgba(100, 150, 255, 0.3)`;
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(cx, cy, 68, 0, Math.PI*2);
        ctx.fillStyle = `rgba(50, 80, 150, 0.2)`;
        ctx.fill();
    }

    function drawVirus(ctx, cx, cy, color, timeVal) {
        for (let i=0;i<30;i++) {
            const angle = i * 0.8 + timeVal;
            const rad = 30;
            const x = cx + Math.cos(angle) * rad;
            const y = cy + Math.sin(angle) * rad;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,100,100,0.7)`;
            ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(cx, cy, 28, 0, Math.PI*2);
        ctx.fillStyle = `#ff6666`;
        ctx.fill();
    }

    function drawDefault(ctx, cx, cy, color, timeVal) {
        ctx.beginPath();
        ctx.arc(cx, cy, 35, 0, Math.PI*2);
        ctx.fillStyle = color + '80';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 18, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
    }

    // main draw function
    let starfield = [];
    function initStars(w,h) {
        starfield = [];
        for(let i=0;i<180;i++) {
            starfield.push({
                x: Math.random() * w,
                y: Math.random() * h,
                rad: 1 + Math.random()*2,
                alpha: 0.3+Math.random()*0.5
            });
        }
    }

    function drawCanvas() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        // starfield
        for(let s of starfield) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.rad, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,200,${s.alpha+Math.sin(time)*0.1})`;
            ctx.fill();
        }
        const cx = w/2;
        const cy = h/2 - 10;
        const type = currentItem.type;
        const color = currentItem.color;
        // draw based on type
        switch(type) {
            case 'quantum': drawQuantum(ctx, cx, cy, color, time); break;
            case 'atom': drawAtom(ctx, cx, cy, color, time); break;
            case 'dna': drawDna(ctx, cx, cy, color, time); break;
            case 'virus': drawVirus(ctx, cx, cy, color, time); break;
            case 'human': drawHuman(ctx, cx, cy, color, time); break;
            case 'planet': drawPlanet(ctx, cx, cy, color, time, currentItem.name === "Earth"); break;
            case 'star': drawStar(ctx, cx, cy, color, time); break;
            case 'galaxy': drawGalaxy(ctx, cx, cy, color, time); break;
            case 'universe': drawUniverse(ctx, cx, cy, color, time); break;
            default: drawDefault(ctx, cx, cy, color, time);
        }
        // draw scale indicator text
        ctx.font = "italic 11px monospace";
        ctx.fillStyle = "#ccddff";
        ctx.fillText("← smaller", 20, h-20);
        ctx.fillText("larger →", w-80, h-20);
    }

    function resizeCanvas() {
        const container = canvas.parentElement;
        const maxW = Math.min(700, container.clientWidth - 20);
        canvas.width = maxW;
        canvas.height = 400;
        initStars(canvas.width, canvas.height);
        drawCanvas();
    }

    function updateUI() {
        categorySpan.innerText = currentItem.category;
        objectNameSpan.innerText = currentItem.name;
        objectSizeSpan.innerText = currentItem.size;
        objectDescSpan.innerText = currentItem.desc;
        drawCanvas();
    }

    function setByExponent(exp) {
        currentItem = getClosestItem(exp);
        const sliderVal = expToSlider(currentItem.exp);
        slider.value = sliderVal;
        updateUI();
    }

    function setByIndex(idx) {
        if(idx >=0 && idx < scaleItems.length) {
            currentItem = scaleItems[idx];
            slider.value = expToSlider(currentItem.exp);
            updateUI();
        }
    }

    // event handlers
    slider.addEventListener('input', (e) => {
        const exp = sliderToExp(parseFloat(e.target.value));
        currentItem = getClosestItem(exp);
        updateUI();
    });

    // scroll wheel
    window.addEventListener('wheel', (e) => {
        let delta = e.deltaY > 0 ? 0.02 : -0.02;
        let newVal = parseFloat(slider.value) + delta;
        newVal = Math.min(100, Math.max(0, newVal));
        slider.value = newVal;
        const exp = sliderToExp(newVal);
        currentItem = getClosestItem(exp);
        updateUI();
        e.preventDefault();
    }, { passive: false });

    // buttons
    document.querySelectorAll('.scale-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.index);
            if(!isNaN(idx)) setByIndex(idx);
        });
    });

    // resize observer
    window.addEventListener('resize', () => resizeCanvas());
    resizeCanvas();

    // animation loop
    function animate() {
        time += 0.025;
        drawCanvas();
        requestAnimationFrame(animate);
    }
    animate();

    // set initial to Human
    setByIndex(9);
</script>
</body>
</html>
