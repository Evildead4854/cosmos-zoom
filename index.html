<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum to Cosmos | The Full Spectrum of Existence</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* UI Overlay */
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px 35px;
            box-sizing: border-box;
        }
        
        .info-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 20px;
            padding: 18px 25px;
            max-width: 380px;
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        
        .category-badge {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00f2ff;
            margin-bottom: 8px;
        }
        
        .entity-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #00f2ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        .size-info {
            font-size: 0.85rem;
            opacity: 0.8;
            font-family: monospace;
        }
        
        .scientific {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 5px;
        }
        
        .controls-panel {
            pointer-events: auto;
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .ctrl-btn {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-size: 0.75rem;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .ctrl-btn:hover {
            background: rgba(0, 242, 255, 0.3);
            border-color: #00f2ff;
            transform: scale(1.05);
        }
        
        .timeline-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            pointer-events: auto;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 12px 20px;
        }
        
        .timeline-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .timeline-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00f2ff, #ffaa00);
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        
        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.6rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        
        .instruction {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.65rem;
            opacity: 0.4;
            letter-spacing: 1px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
        }
        
        @media (max-width: 768px) {
            #ui { padding: 15px; }
            .info-panel { padding: 12px 18px; max-width: 280px; }
            .entity-name { font-size: 1.3rem; }
            .controls-panel { gap: 6px; margin-bottom: 10px; }
            .ctrl-btn { padding: 6px 14px; font-size: 0.6rem; }
            .timeline-container { width: 280px; padding: 8px 15px; bottom: 15px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="info-panel">
            <div class="category-badge" id="categoryBadge">⚛️ QUANTUM REALM</div>
            <div class="entity-name" id="entityName">Planck Length</div>
            <div class="size-info" id="sizeInfo">1.6 × 10⁻³⁵ meters</div>
            <div class="scientific" id="scientificInfo">The smallest measurable length</div>
        </div>
        
        <div>
            <div class="controls-panel">
                <button class="ctrl-btn" id="zoomOutBtn">⟵ ZOOM OUT</button>
                <button class="ctrl-btn" id="zoomInBtn">ZOOM IN ⟶</button>
                <button class="ctrl-btn" id="resetBtn">⟡ RESET</button>
                <button class="ctrl-btn" id="quantumBtn">⚛️ QUANTUM</button>
                <button class="ctrl-btn" id="humanBtn">👤 HUMAN</button>
                <button class="ctrl-btn" id="cosmicBtn">🌌 COSMIC</button>
            </div>
            <div class="timeline-container">
                <div class="timeline-bar" id="timelineBar">
                    <div class="timeline-fill" id="timelineFill"></div>
                </div>
                <div class="timeline-labels">
                    <span>⚛️ Planck</span>
                    <span>🧬 Atomic</span>
                    <span>🐜 Insect</span>
                    <span>👤 Human</span>
                    <span>🌍 Earth</span>
                    <span>🌞 Solar</span>
                    <span>🌀 Galaxy</span>
                    <span>🌌 Universe</span>
                </div>
            </div>
        </div>
    </div>
    <div class="instruction">🖱️ DRAG to rotate | SCROLL to zoom through scales</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.00001);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 1000000);
        camera.position.set(0, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // Post-processing bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.3, 0.2);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.6;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // Controls for rotation
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.5;
        controls.rotateSpeed = 1.0;
        controls.enablePan = true;
        controls.panSpeed = 0.8;
        
        // Scale data - journey from quantum to cosmic
        const scaleStages = [
            { realm: "⚛️ QUANTUM REALM", name: "Planck Length", size: "1.6 × 10⁻³⁵ m", scientific: "The fabric of spacetime itself", exp: -35, cameraDist: 0.5, scale: 0.0001 },
            { realm: "⚛️ QUANTUM REALM", name: "Quantum Foam", size: "10⁻³⁴ m", scientific: "Spacetime fluctuations", exp: -34, cameraDist: 0.6, scale: 0.0002 },
            { realm: "⚛️ QUANTUM REALM", name: "Neutrino", size: "10⁻²⁴ m", scientific: "Ghost particle", exp: -24, cameraDist: 0.8, scale: 0.0005 },
            { realm: "⚛️ QUANTUM REALM", name: "Quark", size: "10⁻¹⁸ m", scientific: "Building block of matter", exp: -18, cameraDist: 1.0, scale: 0.001 },
            { realm: "⚛️ QUANTUM REALM", name: "Proton", size: "1.7 × 10⁻¹⁵ m", scientific: "Nuclear particle", exp: -15, cameraDist: 1.2, scale: 0.002 },
            { realm: "🧬 ATOMIC SCALE", name: "Hydrogen Atom", size: "1.0 × 10⁻¹⁰ m", scientific: "Electron cloud", exp: -10, cameraDist: 1.5, scale: 0.005 },
            { realm: "🧬 ATOMIC SCALE", name: "DNA Molecule", size: "2 × 10⁻⁹ m", scientific: "Blueprint of life", exp: -9, cameraDist: 1.8, scale: 0.01 },
            { realm: "🦠 MICROSCOPIC", name: "Virus", size: "1 × 10⁻⁷ m", scientific: "Invisible invader", exp: -7, cameraDist: 2.0, scale: 0.03 },
            { realm: "🦠 MICROSCOPIC", name: "Red Blood Cell", size: "8 × 10⁻⁶ m", scientific: "Carrier of life", exp: -5, cameraDist: 2.2, scale: 0.08 },
            { realm: "🐜 LIVING WORLD", name: "Ant", size: "5 × 10⁻³ m", scientific: "Tiny architect", exp: -2.3, cameraDist: 2.5, scale: 0.3 },
            { realm: "👤 HUMAN SCALE", name: "Human", size: "1.7 meters", scientific: "You are here", exp: 0, cameraDist: 3.0, scale: 1.0 },
            { realm: "🌍 PLANETARY", name: "Earth", size: "12,742 km", scientific: "Our home", exp: 7.1, cameraDist: 8, scale: 5 },
            { realm: "🌍 PLANETARY", name: "Jupiter", size: "139,820 km", scientific: "King of planets", exp: 8.1, cameraDist: 12, scale: 8 },
            { realm: "🌞 STELLAR", name: "The Sun", size: "1.39 × 10⁶ km", scientific: "Our star", exp: 9.1, cameraDist: 18, scale: 12 },
            { realm: "🌞 STELLAR", name: "Solar System", size: "287 billion km", scientific: "The Sun's family", exp: 12.4, cameraDist: 30, scale: 20 },
            { realm: "🌀 GALACTIC", name: "Orion Nebula", size: "24 light-years", scientific: "Star nursery", exp: 17.4, cameraDist: 60, scale: 35 },
            { realm: "🌀 GALACTIC", name: "Milky Way", size: "100,000 light-years", scientific: "Our galaxy", exp: 21, cameraDist: 120, scale: 70 },
            { realm: "🌀 GALACTIC", name: "Local Group", size: "10 million light-years", scientific: "Galactic neighborhood", exp: 23, cameraDist: 200, scale: 120 },
            { realm: "🌌 COSMIC", name: "Virgo Supercluster", size: "110 million light-years", scientific: "Galactic filament", exp: 24, cameraDist: 350, scale: 200 },
            { realm: "🌌 COSMIC", name: "Observable Universe", size: "93 billion light-years", scientific: "The cosmic horizon", exp: 26.9, cameraDist: 600, scale: 350 }
        ];
        
        // Create central objects for each scale
        const objects = [];
        
        scaleStages.forEach((stage, idx) => {
            let geometry, material, mesh;
            const color = new THREE.Color().setHSL(0.55 + idx * 0.02, 0.8, 0.5);
            
            if (stage.name === "Earth") {
                // Detailed Earth
                geometry = new THREE.SphereGeometry(1, 128, 128);
                material = new THREE.MeshStandardMaterial({
                    color: 0x2277ff,
                    emissive: 0x004466,
                    roughness: 0.5,
                    metalness: 0.1
                });
                mesh = new THREE.Mesh(geometry, material);
                
                // Add atmosphere
                const atmGeo = new THREE.SphereGeometry(1.02, 64, 64);
                const atmMat = new THREE.MeshPhongMaterial({ color: 0x44aaff, transparent: true, opacity: 0.15 });
                const atmosphere = new THREE.Mesh(atmGeo, atmMat);
                mesh.add(atmosphere);
            } else if (stage.name === "The Sun") {
                geometry = new THREE.SphereGeometry(1, 128, 128);
                material = new THREE.MeshStandardMaterial({
                    color: 0xffaa44,
                    emissive: 0xff4422,
                    emissiveIntensity: 0.8,
                    roughness: 0.3
                });
                mesh = new THREE.Mesh(geometry, material);
            } else if (stage.name === "Milky Way") {
                // Galaxy particle system
                const particleCount = 3000;
                const particleGeo = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount; i++) {
                    const radius = Math.pow(Math.random(), 1.5) * 2;
                    const angle = Math.random() * Math.PI * 2;
                    const y = (Math.random() - 0.5) * 0.5;
                    positions[i*3] = Math.cos(angle) * radius;
                    positions[i*3+1] = y;
                    positions[i*3+2] = Math.sin(angle) * radius;
                }
                particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const particleMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.03 });
                mesh = new THREE.Points(particleGeo, particleMat);
            } else if (stage.name === "Observable Universe") {
                // Universe bubble
                geometry = new THREE.SphereGeometry(1, 64, 64);
                material = new THREE.MeshPhongMaterial({
                    color: 0x113366,
                    transparent: true,
                    opacity: 0.15,
                    wireframe: true
                });
                mesh = new THREE.Mesh(geometry, material);
            } else {
                geometry = new THREE.SphereGeometry(0.5, 64, 64);
                material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    metalness: 0.8,
                    roughness: 0.2
                });
                mesh = new THREE.Mesh(geometry, material);
            }
            
            mesh.userData = { stage: stage, scale: stage.scale, baseSize: 1 };
            scene.add(mesh);
            objects.push(mesh);
        });
        
        // Add starfield background
        const starCount = 4000;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 1000 - 500;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // Add orbiting particles around objects (quantum glow)
        const particleSystems = [];
        objects.forEach((obj, i) => {
            const particleCount = 200;
            const particleGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let j = 0; j < particleCount; j++) {
                positions[j*3] = (Math.random() - 0.5) * 1.5;
                positions[j*3+1] = (Math.random() - 0.5) * 1.5;
                positions[j*3+2] = (Math.random() - 0.5) * 1.5;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.02, transparent: true, opacity: 0.5 });
            const particles = new THREE.Points(particleGeo, particleMat);
            obj.add(particles);
            particleSystems.push(particles);
        });
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4488ff, 0.5);
        backLight.position.set(0, 0, -5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa44, 0.3);
        fillLight.position.set(3, 2, 4);
        scene.add(fillLight);
        
        // State management
        let currentIndex = 10; // Start at Human
        let targetIndex = 10;
        let currentCameraDist = scaleStages[10].cameraDist;
        
        // UI Elements
        const categoryBadge = document.getElementById('categoryBadge');
        const entityName = document.getElementById('entityName');
        const sizeInfo = document.getElementById('sizeInfo');
        const scientificInfo = document.getElementById('scientificInfo');
        const timelineFill = document.getElementById('timelineFill');
        
        function updateScale() {
            // Smooth interpolation
            currentIndex += (targetIndex - currentIndex) * 0.05;
            const idx = Math.floor(currentIndex);
            const blend = currentIndex - idx;
            
            const currentStage = scaleStages[Math.min(idx, scaleStages.length - 1)];
            const nextStage = scaleStages[Math.min(idx + 1, scaleStages.length - 1)];
            
            if (currentStage) {
                // Update UI
                if (blend < 0.5 || !nextStage) {
                    categoryBadge.textContent = currentStage.realm;
                    entityName.textContent = currentStage.name;
                    sizeInfo.textContent = currentStage.size;
                    scientificInfo.textContent = currentStage.scientific;
                } else {
                    categoryBadge.textContent = nextStage.realm;
                    entityName.textContent = nextStage.name;
                    sizeInfo.textContent = nextStage.size;
                    scientificInfo.textContent = nextStage.scientific;
                }
            }
            
            // Update timeline
            const progress = currentIndex / (scaleStages.length - 1);
            timelineFill.style.width = `${progress * 100}%`;
            
            // Update all objects visibility and scale
            objects.forEach((obj, i) => {
                const stage = obj.userData.stage;
                const distance = Math.abs(currentIndex - i);
                const opacity = Math.max(0, 1 - distance * 0.15);
                
                if (opacity > 0.01) {
                    obj.visible = true;
                    // Scale based on distance from current view
                    const scaleFactor = Math.pow(2, -(stage.exp - (currentStage?.exp || 0))) * 0.5;
                    const finalScale = Math.min(3, Math.max(0.05, scaleFactor));
                    obj.scale.setScalar(finalScale);
                    
                    if (obj.material) {
                        obj.material.transparent = true;
                        obj.material.opacity = Math.min(1, opacity);
                    }
                } else {
                    obj.visible = false;
                }
            });
            
            // Update camera distance
            if (nextStage) {
                currentCameraDist = currentStage.cameraDist + (nextStage.cameraDist - currentStage.cameraDist) * blend;
            } else {
                currentCameraDist = currentStage.cameraDist;
            }
            
            // Smooth camera movement
            const targetPos = new THREE.Vector3(0, 0, currentCameraDist);
            camera.position.lerp(targetPos, 0.05);
            controls.target.set(0, 0, 0);
            controls.update();
        }
        
        // Zoom functions
        function zoomOut() {
            targetIndex = Math.min(scaleStages.length - 1, targetIndex + 0.3);
        }
        
        function zoomIn() {
            targetIndex = Math.max(0, targetIndex - 0.3);
        }
        
        function reset() {
            targetIndex = 10; // Human scale
        }
        
        function goToQuantum() {
            targetIndex = 0;
        }
        
        function goToHuman() {
            targetIndex = 10;
        }
        
        function goToCosmic() {
            targetIndex = scaleStages.length - 1;
        }
        
        // Event listeners
        document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
        document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('quantumBtn').addEventListener('click', goToQuantum);
        document.getElementById('humanBtn').addEventListener('click', goToHuman);
        document.getElementById('cosmicBtn').addEventListener('click', goToCosmic);
        
        // Timeline click
        const timelineBar = document.getElementById('timelineBar');
        timelineBar.addEventListener('click', (e) => {
            const rect = timelineBar.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = x / rect.width;
            targetIndex = percent * (scaleStages.length - 1);
        });
        
        // Scroll wheel for zoom
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) {
                targetIndex = Math.min(scaleStages.length - 1, targetIndex + 0.08);
            } else {
                targetIndex = Math.max(0, targetIndex - 0.08);
            }
        });
        
        // Touch support
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            const delta = (touchStartY - e.touches[0].clientY) * 0.003;
            targetIndex = Math.min(scaleStages.length - 1, Math.max(0, targetIndex + delta));
            touchStartY = e.touches[0].clientY;
        });
        
        // Animation loop
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            updateScale();
            
            // Rotate stars slowly
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            
            // Animate particles
            particleSystems.forEach((system, i) => {
                system.rotation.y = time * 0.5;
                system.rotation.x = time * 0.3;
            });
            
            // Rotate objects at different speeds
            objects.forEach((obj, i) => {
                obj.rotation.y += 0.005;
            });
            
            effectComposer.render();
        }
        
        animate();
        
        // Handle resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('🌌 Universe simulation ready | Drag to rotate | Scroll through all scales');
    </script>
</body>
</html>
